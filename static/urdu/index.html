<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urdu Script Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Urdu Script Quest</p>
          <h1>Read Urdu, one character at a time</h1>
        </div>
        <div class="stats">
          <div class="pill">
            <span>Lessons</span>
            <strong id="lessonCount">0/0</strong>
          </div>
          <div class="pill">
            <span>XP</span>
            <strong id="xpCount">0</strong>
          </div>
        </div>
      </header>

      <section id="screenPath" class="screen active">
        <div class="panel intro-panel">
          <h2>Your Learning Path</h2>
          <p>
            Each lesson introduces new Urdu characters with guided drills. Later lessons
            mix in earlier characters so reading becomes automatic.
          </p>
        </div>
        <div id="lessonPath" class="lesson-path"></div>
      </section>

      <section id="screenLesson" class="screen">
        <div class="panel lesson-panel">
          <div class="lesson-head">
            <h2 id="lessonTitle"></h2>
            <button id="exitLessonBtn" class="ghost-btn">Exit</button>
          </div>
          <div class="progress-wrap">
            <div class="progress-track">
              <div id="progressBar" class="progress-bar"></div>
            </div>
            <span id="progressLabel">0%</span>
          </div>
          <div id="lessonCard" class="lesson-card"></div>
          <div id="choices" class="choices"></div>
          <div class="actions">
            <button id="nextBtn" class="primary-btn" disabled>Continue</button>
          </div>
        </div>
      </section>

      <section id="screenResult" class="screen">
        <div class="panel result-panel">
          <h2 id="resultTitle"></h2>
          <p id="resultSummary"></p>
          <div id="resultBreakdown" class="result-breakdown"></div>
          <div class="actions">
            <button id="retryBtn" class="secondary-btn">Retry Lesson</button>
            <button id="pathBtn" class="primary-btn">Back to Path</button>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
